<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>ACM Side Scroller — Workshop Boilerplate</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
    }
    #game-container {
      box-shadow: 0 0 32px rgba(255,200,50,0.2);
      border: 2px solid #333;
    }
  </style>
</head>
<body>
<div id="game-container"></div>

<script>
// =============================================================
// ACM SIDE SCROLLER BOILERPLATE
// Goal: finish a playable game in ~1 hour.
//
// Workshop tasks are marked:  TODO(1) through TODO(6)
// Everything else is wired up for you.
// =============================================================


// =============================================================
// SECTION 1 — CONSTANTS  (tweak these freely)
// =============================================================
const GAME_W      = 800;
const GAME_H      = 400;
const GRAVITY     = 600;   // pixels/sec² pulled down
const MOVE_SPEED  = 220;   // horizontal run speed
const JUMP_FORCE  = 450;   // upward velocity on jump (positive = up)
const WORLD_W     = 4000;  // how wide the full level is


// =============================================================
// SECTION 2 — COLORS  (change these to theme your game)
// =============================================================
const COLOR = {
  sky:        0x87ceeb,   // light blue background
  ground:     0x5a8a3a,   // dark green ground
  groundTop:  0x7ab84a,   // lighter top stripe
  platform:   0x8b5e3c,   // wooden-brown platforms
  platformTop:0xc8834a,
  player:     0x4488ff,   // blue player square
  playerEye:  0xffffff,
  enemy:      0xff4444,   // red enemy
  enemyEye:   0x000000,
  coin:       0xffe030,   // gold coin
  coinShine:  0xfff488,
};


// =============================================================
// SECTION 3 — LEVEL DATA
// Edit these arrays to design your level.
// Coordinates are in pixels (x from left, y from top).
// =============================================================

// Each platform: { x: center-x, y: center-y, w: width }
const PLATFORMS = [
  { x: 300,  y: 300, w: 120 },
  { x: 500,  y: 260, w: 100 },
  { x: 700,  y: 220, w: 100 },
  { x: 900,  y: 280, w: 140 },
  { x: 1100, y: 240, w: 100 },
  { x: 1350, y: 200, w: 120 },
  { x: 1600, y: 260, w: 100 },
  { x: 1850, y: 220, w: 130 },
  { x: 2100, y: 180, w: 110 },
  { x: 2350, y: 260, w: 120 },
  { x: 2600, y: 220, w: 100 },
  { x: 2850, y: 280, w: 140 },
  { x: 3100, y: 240, w: 110 },
  { x: 3350, y: 200, w: 120 },
];

// Each coin: { x, y }
const COINS = [
  { x: 300,  y: 260 }, { x: 320, y: 260 }, { x: 340, y: 260 },
  { x: 500,  y: 220 }, { x: 520, y: 220 },
  { x: 700,  y: 180 }, { x: 720, y: 180 }, { x: 740, y: 180 },
  { x: 900,  y: 240 }, { x: 920, y: 240 },
  { x: 1100, y: 200 }, { x: 1120, y: 200 }, { x: 1140, y: 200 },
  { x: 1350, y: 160 },
  { x: 1600, y: 220 }, { x: 1620, y: 220 },
  { x: 1850, y: 180 }, { x: 1870, y: 180 }, { x: 1890, y: 180 },
  { x: 2100, y: 140 }, { x: 2120, y: 140 },
  { x: 2350, y: 220 }, { x: 2370, y: 220 }, { x: 2390, y: 220 },
  { x: 2600, y: 180 }, { x: 2620, y: 180 },
  { x: 2850, y: 240 }, { x: 2870, y: 240 },
  { x: 3100, y: 200 }, { x: 3120, y: 200 }, { x: 3140, y: 200 },
  { x: 3350, y: 160 }, { x: 3370, y: 160 },
];

// Each enemy: { x, y }
// Enemies patrol back and forth automatically.
const ENEMIES = [
  { x: 500,  y: 340 },
  { x: 900,  y: 340 },
  { x: 700,  y: 195 },   // on top of a platform
  { x: 1100, y: 340 },
  { x: 1350, y: 175 },   // on platform
  { x: 1600, y: 340 },
  { x: 1850, y: 195 },
  { x: 2100, y: 340 },
  { x: 2350, y: 235 },
  { x: 2600, y: 340 },
  { x: 2850, y: 255 },
  { x: 3100, y: 340 },
  { x: 3350, y: 175 },
];


// =============================================================
// SECTION 4 — GAME SCENE
// This is where all the action happens.
// =============================================================
class GameScene extends Phaser.Scene {
  constructor() { super({ key: 'GameScene' }); }

  // -----------------------------------------------------------
  // preload() — load external assets here
  // (We draw everything with code, so nothing to load today)
  // -----------------------------------------------------------
  preload() {
    // Example (uncomment if you have real assets):
    // this.load.image('player', 'assets/player.png');
    // this.load.audio('jump', 'assets/jump.wav');
  }

  // -----------------------------------------------------------
  // create() — runs once when the scene starts.
  // Build the world here.
  // -----------------------------------------------------------
  create() {
    // -- State --
    this.score = 0;
    this.dead  = false;

    // -- World bounds (wider than the screen) --
    this.physics.world.setBounds(0, 0, WORLD_W, GAME_H + 200);

    // ---- BACKGROUND ----
    this.makeBackground();

    // ---- GROUND ----
    // A StaticGroup never moves and doesn't need physics updates.
    this.groundGroup = this.physics.add.staticGroup();
    this.buildGround();

    // ---- PLATFORMS ----
    this.platformGroup = this.physics.add.staticGroup();
    this.buildPlatforms();

    // ---- COINS ----
    this.coinGroup = this.physics.add.staticGroup();
    this.buildCoins();

    // ---- ENEMIES ----
    // A regular (dynamic) Group — enemies move around.
    this.enemyGroup = this.physics.add.group();
    this.buildEnemies();

    // ---- PLAYER ----
    this.player = this.buildPlayer();

    // ---- PHYSICS COLLIDERS & OVERLAPS ----
    // Collider = solid (things stop each other)
    this.physics.add.collider(this.player, this.groundGroup);
    this.physics.add.collider(this.player, this.platformGroup);
    this.physics.add.collider(this.enemyGroup, this.groundGroup);
    this.physics.add.collider(this.enemyGroup, this.platformGroup);

    // Overlap = trigger a callback without blocking
    this.physics.add.overlap(
      this.player, this.coinGroup,
      this.onCoinCollect, null, this   // callback, filter, context
    );
    this.physics.add.overlap(
      this.player, this.enemyGroup,
      this.onEnemyTouch, null, this
    );

    // ---- CAMERA ----
    // Follow the player. setBounds prevents showing outside the world.
    this.cameras.main.setBounds(0, 0, WORLD_W, GAME_H);
    this.cameras.main.startFollow(this.player, true, 0.1, 1);

    // ---- INPUT ----
    this.cursors = this.input.keyboard.createCursorKeys(); // arrow keys
    this.wasd    = this.input.keyboard.addKeys({
      up:    Phaser.Input.Keyboard.KeyCodes.W,
      left:  Phaser.Input.Keyboard.KeyCodes.A,
      right: Phaser.Input.Keyboard.KeyCodes.D,
    });
    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    // ---- HUD ----
    // setScrollFactor(0) pins text to the screen, not the world.
    this.scoreText = this.add.text(16, 12, 'SCORE: 0', {
      fontFamily: 'monospace', fontSize: '18px', color: '#ffffff',
      stroke: '#000', strokeThickness: 3,
    }).setScrollFactor(0).setDepth(10);

    this.livesText = this.add.text(GAME_W - 16, 12, 'LIVES: 3', {
      fontFamily: 'monospace', fontSize: '18px', color: '#ffdd44',
      stroke: '#000', strokeThickness: 3,
    }).setScrollFactor(0).setDepth(10).setOrigin(1, 0);

    this.lives = 3;
  }

  // -----------------------------------------------------------
  // update() — runs every frame (~60fps).
  // Put movement and game logic here.
  // -----------------------------------------------------------
  update() {
    if (this.dead) return;

    const onGround = this.player.body.blocked.down; // true if standing on something
    const left  = this.cursors.left.isDown  || this.wasd.left.isDown;
    const right  = this.cursors.right.isDown || this.wasd.right.isDown;
    const jump  =
      Phaser.Input.Keyboard.JustDown(this.cursors.up)   ||
      Phaser.Input.Keyboard.JustDown(this.wasd.up)      ||
      Phaser.Input.Keyboard.JustDown(this.spaceKey)     ||
      Phaser.Input.Keyboard.JustDown(this.cursors.space);

    // Horizontal movement
    if (left) {
      this.player.setVelocityX(-MOVE_SPEED);
      this.player.flipX = true;
    } else if (right) {
      this.player.setVelocityX(MOVE_SPEED);
      this.player.flipX = false;
    } else {
      this.player.setVelocityX(0);  // stop sliding
    }

    // Jump — only when touching ground
    if (jump && onGround) {
      this.player.setVelocityY(-JUMP_FORCE);
    }

    // Fall into pit = death
    if (this.player.y > GAME_H + 50) {
      this.killPlayer();
    }

    // Enemy patrol: reverse direction when hitting a wall or reaching a ledge
    this.enemyGroup.children.iterate(enemy => {
      if (!enemy || !enemy.active) return;

      // Wall collision reversal
      if (enemy.body.blocked.right) enemy.setVelocityX(-80);
      if (enemy.body.blocked.left)  enemy.setVelocityX(80);

      // Ledge detection: probe one step ahead of the enemy's feet.
      // If there's no ground/platform tile below that point, reverse.
      const stepAhead = enemy.body.velocity.x > 0
        ? enemy.body.right + 2          // moving right: check right edge
        : enemy.body.left  - 2;         // moving left:  check left edge
      const feetY = enemy.body.bottom + 4;  // just below the enemy

      const onGround =
        this.physics.overlapRect(stepAhead, feetY, 2, 8, false, true)
          .some(b => {
            const go = b.gameObject;
            return (
              this.groundGroup.contains(go) ||
              this.platformGroup.contains(go)
            );
          });

      if (!onGround) {
        enemy.setVelocityX(enemy.body.velocity.x > 0 ? -80 : 80);
      }
    });
  }


  // ===========================================================
  // EVENT HANDLERS
  // ===========================================================

  // Called when player touches a coin
  onCoinCollect(player, coin) {
    coin.destroy();
    this.score += 10;
    this.scoreText.setText('SCORE: ' + this.score);

    // TODO(4): add a visual particle burst or floating "+10" text here
  }

  // Called every frame the player overlaps an enemy
  onEnemyTouch(player, enemy) {
    if (!enemy.active) return;

    // Stomp detection: player must be falling AND above the enemy's center
    const stomping = player.body.velocity.y > 50 && player.y < enemy.y - 8;

    if (stomping) {
      // Defeat the enemy
      enemy.setActive(false).setVisible(false);
      player.setVelocityY(-280);   // bounce off
      this.score += 50;
      this.scoreText.setText('SCORE: ' + this.score);

      // TODO(5): play a squish sound / show a squish animation here

      this.time.delayedCall(300, () => enemy.destroy());
    } else {
      this.killPlayer();
    }
  }

  // Lose a life, respawn or game over
  killPlayer() {
    if (this.dead) return;
    this.dead = true;
    this.lives--;
    this.livesText.setText('LIVES: ' + this.lives);

    // Flash the camera red
    this.cameras.main.flash(300, 255, 0, 0);

    this.time.delayedCall(600, () => {
      if (this.lives <= 0) {
        this.scene.start('GameOverScene', { score: this.score });
      } else {
        // Respawn: reset position and state
        this.player.setPosition(80, GAME_H - 80);
        this.player.setVelocity(0, 0);
        this.dead = false;
      }
    });
  }


  // ===========================================================
  // BUILDER HELPERS
  // These draw all the game objects using Phaser's Graphics API.
  // No image files needed!
  // ===========================================================

  // Sky gradient + decorative hills in the background
  makeBackground() {
    // Sky
    const sky = this.add.graphics();
    sky.fillGradientStyle(0x5588cc, 0x5588cc, 0x99ccee, 0x99ccee, 1);
    sky.fillRect(0, 0, WORLD_W, GAME_H);
    sky.setScrollFactor(0.1);   // slow parallax

    // Simple hills (decorative only, not collideable)
    const hills = this.add.graphics();
    hills.fillStyle(0x4a7a30, 0.6);
    for (let x = 0; x < WORLD_W; x += 300) {
      const r = Phaser.Math.Between(60, 120);
      hills.fillEllipse(x + r, GAME_H - 16, r * 2.5, r);
    }
    hills.setScrollFactor(0.3);   // mid parallax
  }

  // Solid ground running the full world width
  buildGround() {
    const H    = GAME_H;
    const TILE = 20;   // height of each ground tile

    // Draw a ground texture and generate a reusable key
    const g = this.make.graphics({ add: false });
    g.fillStyle(COLOR.ground);   g.fillRect(0, 0, TILE, TILE);
    g.fillStyle(COLOR.groundTop); g.fillRect(0, 0, TILE, 4);
    g.generateTexture('ground_tile', TILE, TILE);
    g.destroy();

    // Fill the ground row
    for (let x = 0; x < WORLD_W; x += TILE) {
      this.groundGroup.create(x + TILE / 2, H - TILE / 2, 'ground_tile');
    }
  }

  // Floating platforms from the PLATFORMS array
  buildPlatforms() {
    // Draw one platform tile
    const g = this.make.graphics({ add: false });
    g.fillStyle(COLOR.platform);    g.fillRect(0, 0, 20, 16);
    g.fillStyle(COLOR.platformTop); g.fillRect(0, 0, 20, 4);
    g.generateTexture('plat_tile', 20, 16);
    g.destroy();

    PLATFORMS.forEach(({ x, y, w }) => {
      // Place tiles side by side to form a platform of width w
      for (let tx = x - w / 2; tx < x + w / 2; tx += 20) {
        this.platformGroup.create(tx + 10, y, 'plat_tile');
      }
    });
  }

  // Collectible coins from the COINS array
  buildCoins() {
    // Draw a single coin texture
    const g = this.make.graphics({ add: false });
    g.fillStyle(COLOR.coin);
    g.fillCircle(8, 8, 8);
    g.fillStyle(COLOR.coinShine);
    g.fillCircle(6, 5, 3);
    g.generateTexture('coin', 16, 16);
    g.destroy();

    COINS.forEach(({ x, y }) => {
      const coin = this.coinGroup.create(x, y, 'coin');
      coin.body.setCircle(8);   // circular hitbox matches the art

      // TODO(3): add a bobbing tween to each coin with this.tweens.add(...)
    });
  }

  // Enemies from the ENEMIES array
  buildEnemies() {
    // Draw a blocky enemy texture
    const g = this.make.graphics({ add: false });
    g.fillStyle(COLOR.enemy);       g.fillRect(0, 0, 24, 24);
    g.fillStyle(COLOR.enemyEye);    g.fillCircle(7, 8, 3);
    g.fillCircle(17, 8, 3);
    g.fillStyle(0x000000);
    g.fillRect(6, 15, 12, 2);     // angry mouth line
    g.generateTexture('enemy', 24, 24);
    g.destroy();

    ENEMIES.forEach(({ x, y }) => {
      const e = this.enemyGroup.create(x, y, 'enemy');
      e.setCollideWorldBounds(true);
      e.setGravityY(200);
      e.setVelocityX(80);   // start moving right
    });
  }

  // Player character
  buildPlayer() {
    // Draw the player texture
    const g = this.make.graphics({ add: false });
    g.fillStyle(COLOR.player);    g.fillRect(0, 0, 24, 28);
    g.fillStyle(COLOR.playerEye); g.fillRect(16, 6, 5, 5);   // eye (right-facing)
    g.fillStyle(0x000000);        g.fillRect(18, 8, 2, 2);   // pupil
    g.generateTexture('player', 24, 28);
    g.destroy();

    const p = this.physics.add.sprite(80, GAME_H - 80, 'player');
    p.setCollideWorldBounds(true);
    p.setGravityY(200);   // extra gravity on top of world gravity
    p.setDepth(5);
    return p;
  }
}


// =============================================================
// GAME OVER SCENE
// =============================================================
class GameOverScene extends Phaser.Scene {
  constructor() { super({ key: 'GameOverScene' }); }

  create(data) {
    const W = GAME_W, H = GAME_H;
    this.add.rectangle(W/2, H/2, W, H, 0x000000, 0.85);

    this.add.text(W/2, H/2 - 60, 'GAME OVER', {
      fontFamily: 'monospace', fontSize: '40px', color: '#ff4444',
      stroke: '#000', strokeThickness: 6,
    }).setOrigin(0.5);

    this.add.text(W/2, H/2, 'SCORE: ' + (data.score || 0), {
      fontFamily: 'monospace', fontSize: '22px', color: '#ffe030',
    }).setOrigin(0.5);

    const restart = this.add.text(W/2, H/2 + 60, 'PRESS SPACE TO PLAY AGAIN', {
      fontFamily: 'monospace', fontSize: '14px', color: '#aaffaa',
    }).setOrigin(0.5);

    this.tweens.add({ targets: restart, alpha: 0, duration: 600, yoyo: true, repeat: -1 });

    this.input.keyboard.once('keydown-SPACE', () => {
      this.scene.start('GameScene');
    });
  }
}


// =============================================================
// PHASER GAME CONFIG
// =============================================================
const config = {
  type:   Phaser.AUTO,          // WebGL if available, else Canvas
  width:  GAME_W,
  height: GAME_H,
  parent: 'game-container',

  physics: {
    default: 'arcade',          // fast axis-aligned physics, perfect for platformers
    arcade: {
      gravity: { y: GRAVITY },  // pulls everything down every frame
      debug:   false,           // ← set TRUE to see all hitboxes
    },
  },

  scene: [GameScene, GameOverScene],
};

new Phaser.Game(config);

</script>
